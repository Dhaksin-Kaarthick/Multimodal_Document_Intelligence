version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: doc_intelligence_backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/uploads:/app/uploads
      - backend_data_vol:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://host.docker.internal:11434
      # FORCE DOCKER COMPOSE TO PASS IT EXPLICITLY INTO CONTAINER MEMORY SPACE
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY} 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: doc_intelligence_frontend
    ports:
      - "3000:80"
    volumes:
      - ./Frontend:/usr/share/nginx/html
    restart: unless-stopped

volumes:
  backend_data_vol: {}